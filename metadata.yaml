name: astrbot_plugin_magnetic_link_analysis
display_name: 狐娘磁链解析
desc: "这是一个 AstrBot 磁力链接解析插件：无需指令即可自动识别聊天中的 magnet 链接，调用 whatslink.info 获取资源详情并生成预览消息（名称、文件数、大小，可选截图）。支持 QQ/OneBot 合并转发以减少刷屏，并提供截图加噪（可选）与截图安全下载限制。"
version: v1.0.0
author: Lin100101
repo: https://github.com/Lin100101/astrbot_plugin_magnetic_link_analysis
